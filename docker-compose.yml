version: '3.8'

services:
  it-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: it-pcba-management
    ports:
      - "3003:3002"       # Akses via http://localhost:3003 atau http://IP:3003
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
